<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVerse 5D | عالم الأنمي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="google_translate_element" class="translator-widget"></div>

    <header class="glass-header">
        <h1>🌌 AnimeVerse 5D</h1>
        <p>كل أنميات العالم بين إيديك، نظيفة وبدون لقطات!</p>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ابحث عن أنمي (مثال: Naruto, Attack on Titan)...">
            <button onclick="searchAnime()">ابحث</button>
        </div>
    </header>

    <main>
        <h2 class="section-title">🔥 اقتراحات للمشاهدة</h2>
        <div id="animeGrid" class="anime-grid">
            </div>
    </main>

    <div class="ai-bot-container">
        <div class="ai-bot-header" onclick="toggleBot()">🤖 المساعد الذكي (AI)</div>
        <div class="ai-bot-body" id="aiBody">
            <div class="chat-box" id="chatBox">
                <p class="ai-msg">هلا بيك عيوني! أنا المساعد الذكي، كلي شتحب تشوف (أكشن، كوميديا، مغامرات) وراح أطلعلك أنمي يلوقلك!</p>
            </div>
            <input type="text" id="aiInput" placeholder="اكتب هنا...">
            <button onclick="askAI()">إرسال</button>
        </div>
    </div>

    <div id="animeModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar', includedLanguages: 'ar,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="script.js"></script>
</body>
</html>
