<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE AI ACADEMY | المنظومة التعليمية الكبرى</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="core-system">

    <section id="auth-gate" class="gate-overlay">
        <div class="auth-panel" data-tilt>
            <div class="hex-logo">
                <svg viewBox="0 0 100 100"><polygon points="50,5 95,25 95,75 50,95 5,75 5,25" fill="none" stroke="#00f3ff" stroke-width="2"/></svg>
            </div>
            <h1 id="txt-auth-title" class="neon-text">CORE INTELLIGENCE</h1>
            
            <div id="auth-selection" class="btn-group-v">
                <button id="btn-show-login" class="v-btn v-btn-primary">LOG IN | تسجيل الدخول</button>
                <button id="btn-show-signup" class="v-btn v-btn-outline">CREATE ACCOUNT | حساب جديد</button>
            </div>

            <form id="form-login" class="v-form hidden">
                <input type="email" id="in-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="in-pass" placeholder="كود المرور" required>
                <button type="submit" class="v-btn v-btn-primary">ACTIVATE | تفعيل</button>
                <span class="v-link" onclick="resetAuth()">رجوع</span>
            </form>
        </div>
    </section>

    <main id="main-app" class="app-root hidden">
        <header class="v-header">
            <div class="v-brand">
                <svg class="v-icon" viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 18l-8-4V8l8-4 8 4v8l-8 4z" fill="#00f3ff"/></svg>
                <span id="nav-logo-text">CORE AI</span>
            </div>
            
            <div class="v-nav-actions">
                <div class="lang-selector">
                    <button onclick="setSystemLanguage('ar')" class="lang-btn" id="btn-ar">AR</button>
                    <button onclick="setSystemLanguage('en')" class="lang-btn" id="btn-en">EN</button>
                </div>
                <button id="btn-exit" class="v-btn-exit">EXIT</button>
            </div>
        </header>

        <div class="v-workspace">
            <aside class="v-sidebar">
                <h3 id="txt-tracks-label">المسارات البرمجية</h3>
                <nav id="track-list"></nav>
            </aside>

            <section class="v-content">
                <div class="v-lesson-panel">
                    <div class="v-lesson-header">
                        <h2 id="current-lesson-title">مرحباً بك في نظام CORE</h2>
                        <span class="v-badge" id="txt-status">جاهز</span>
                    </div>
                    <div id="lesson-viewer" class="v-lesson-body">
                        اختر مساراً برمجياً من القائمة الجانبية للبدء.
                    </div>
                    <div class="v-controls">
                        <button id="lesson-prev" class="v-btn-nav">السابق</button>
                        <button id="lesson-next" class="v-btn-nav">التالي</button>
                    </div>
                </div>

                <div class="v-ai-terminal">
                    <div class="ai-header">AI CORE TUTOR | المعلم الذكي</div>
                    <div id="ai-chat-logs" class="ai-logs"></div>
                    <div class="ai-input-area">
                        <input type="text" id="ai-input" placeholder="اسأل الذكاء الاصطناعي عن الكود...">
                        <button id="ai-send">إرسال</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
